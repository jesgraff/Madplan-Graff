
<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madplan – familien Graff</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARIABLES ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --g900: #0f2419;
  --g800: #1a3a2a;
  --g700: #245235;
  --g600: #2d6a4f;
  --g500: #40916c;
  --g400: #52b788;
  --g300: #74c69d;
  --g200: #95d5b2;
  --g100: #d8f3dc;
  --g050: #f0faf2;
  --cream: #faf8f3;
  --white: #ffffff;
  --text:  #1a2e22;
  --muted: #5a7a65;
  --gold:  #c9a84c;
  --shadow-sm: 0 1px 4px rgba(15,36,25,0.08);
  --shadow-md: 0 4px 20px rgba(15,36,25,0.12);
  --shadow-lg: 0 12px 40px rgba(15,36,25,0.18);
  --radius: 16px;
  --radius-sm: 10px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, var(--g800) 0%, var(--g700) 60%, var(--g600) 100%);
  padding: 0 32px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}

/* botanical bg circles */
.header::before {
  content: '';
  position: absolute; top: -80px; right: -80px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(82,183,136,0.15) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.header::after {
  content: '';
  position: absolute; bottom: -60px; left: 20%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(149,213,178,0.1) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.header-inner {
  max-width: 1240px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 0;
  position: relative; z-index: 1;
  gap: 16px;
}

.site-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.3rem, 3vw, 2rem);
  color: var(--white);
  line-height: 1.15;
}
.site-title em {
  color: var(--g200);
  font-style: italic;
}

.week-meta {
  text-align: center;
  flex-shrink: 0;
}
.week-num {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--g200);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.week-range {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.6);
  margin-top: 3px;
}

.nav-btn {
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: var(--radius-sm);
  color: var(--white);
  padding: 10px 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-btn:hover {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.35);
  transform: scale(1.02);
}
.nav-btn:active { transform: scale(0.98); }

/* ── LEAF DECO (inline SVG used via CSS) ── */
.leaf-deco {
  position: absolute;
  pointer-events: none;
  opacity: 0.07;
}

/* ── MAIN ── */
.main {
  max-width: 1240px;
  margin: 0 auto;
  padding: 28px 24px 60px;
}

/* ── HINT BAR ── */
.hint-bar {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  padding: 10px 16px;
  background: var(--g050);
  border: 1px solid var(--g100);
  border-radius: var(--radius-sm);
  font-size: 0.78rem;
  color: var(--muted);
}
.hint-item { display: flex; align-items: center; gap: 6px; }
.hint-icon {
  width: 24px; height: 24px;
  background: var(--g100);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  flex-shrink: 0;
}

/* ── DAYS GRID ── */
.days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 14px;
}

/* ── DAY CARD ── */
.day-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1.5px solid var(--g100);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s, opacity 0.2s;
  cursor: grab;
  position: relative;
  animation: fadeUp 0.4s ease both;
}
.day-card:nth-child(1) { animation-delay: 0.05s; }
.day-card:nth-child(2) { animation-delay: 0.10s; }
.day-card:nth-child(3) { animation-delay: 0.15s; }
.day-card:nth-child(4) { animation-delay: 0.20s; }
.day-card:nth-child(5) { animation-delay: 0.25s; }
.day-card:nth-child(6) { animation-delay: 0.30s; }
.day-card:nth-child(7) { animation-delay: 0.35s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.day-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
  border-color: var(--g300);
}
.day-card.today {
  border-color: var(--g400);
  box-shadow: 0 0 0 3px rgba(82,183,136,0.15), var(--shadow-md);
}
.day-card.dragging {
  opacity: 0.45;
  transform: rotate(2deg) scale(0.97);
  cursor: grabbing;
}
.day-card.drag-over {
  border-color: var(--g400);
  background: var(--g050);
  transform: translateY(-4px) scale(1.02);
  box-shadow: var(--shadow-lg);
}

/* today badge */
.today-badge {
  position: absolute;
  top: 9px; right: 9px;
  background: var(--g400);
  color: var(--white);
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
  z-index: 3;
}

/* drag handle */
.drag-handle {
  position: absolute;
  top: 9px; left: 9px;
  display: flex; flex-direction: column; gap: 3px;
  padding: 4px;
  opacity: 0;
  transition: opacity 0.2s;
  cursor: grab;
  z-index: 3;
}
.drag-handle span {
  display: block;
  width: 16px; height: 2px;
  background: var(--g600);
  border-radius: 2px;
}
.day-card:hover .drag-handle { opacity: 0.5; }

/* card header */
.card-head {
  background: linear-gradient(180deg, var(--g050) 0%, rgba(240,250,242,0) 100%);
  padding: 12px 12px 10px 32px;
  border-bottom: 1px solid var(--g100);
  flex-shrink: 0;
}
.card-dayname {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--g800);
  line-height: 1;
}
.card-date {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 3px;
}

/* image area */
.card-img-wrap {
  width: 100%;
  height: 120px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  background: var(--g050);
}
.card-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s;
}
.day-card:hover .card-img-wrap img { transform: scale(1.04); }

/* upload overlay */
.upload-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px;
  background: var(--g050);
  cursor: pointer;
  transition: background 0.2s;
}
.upload-overlay:hover { background: var(--g100); }
.upload-overlay .u-icon { font-size: 1.6rem; opacity: 0.4; }
.upload-overlay .u-text { font-size: 0.67rem; color: var(--muted); }

/* change-photo button (shown on hover when image exists) */
.change-photo-btn {
  position: absolute; inset: 0;
  background: rgba(15,36,25,0.55);
  color: var(--white);
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  opacity: 0;
  transition: opacity 0.2s;
}
.card-img-wrap:hover .change-photo-btn { opacity: 1; }

/* hidden file input */
.file-input { display: none; }

/* card body */
.card-body {
  padding: 10px 12px 12px;
  flex: 1;
  display: flex;
  align-items: center;
}

.meal-input {
  width: 100%;
  border: none; outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  color: var(--text);
  background: transparent;
  resize: none;
  line-height: 1.45;
  text-align: left;
}
.meal-input::placeholder { color: #bbb; font-style: italic; }
.meal-input:focus {
  background: var(--g050);
  border-radius: 8px;
  padding: 6px 8px;
  margin: -6px -8px;
  width: calc(100% + 16px);
}

/* auto-save indicator */
.save-tick {
  font-size: 0.65rem;
  color: var(--g400);
  display: flex; align-items: center; gap: 4px;
  margin-top: 6px;
  height: 14px;
  opacity: 0;
  transition: opacity 0.4s;
}
.save-tick.show { opacity: 1; }
.save-tick::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--g400);
  border-radius: 50%;
  display: inline-block;
}

/* ── MOBILE: vertical stack ── */
@media (max-width: 860px) {
  .days-grid {
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .day-card {
    flex-direction: row;
    height: 110px;
    cursor: default;
  }
  .drag-handle { display: none; }
  .card-head {
    width: 110px;
    flex-shrink: 0;
    border-bottom: none;
    border-right: 1px solid var(--g100);
    padding: 14px 10px 14px 14px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .card-dayname { font-size: 0.95rem; }
  .card-img-wrap { width: 110px; flex-shrink: 0; height: 110px; }
  .card-body { padding: 10px 14px; justify-content: center; }
  .today-badge { top: auto; bottom: 8px; right: 8px; }
  .header-inner { flex-direction: column; gap: 12px; }
  .site-title { font-size: 1.3rem; text-align: center; }
}

/* ── LOADING SPINNER ── */
.spinner {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
}
.spinner::after {
  content: '';
  width: 26px; height: 26px;
  border: 3px solid var(--g100);
  border-top-color: var(--g400);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--g800);
  color: var(--white);
  padding: 11px 22px;
  border-radius: 40px;
  font-size: 0.82rem;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 9999;
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── FIREBASE SETUP BANNER ── */
.setup-banner {
  background: linear-gradient(135deg, var(--g800), var(--g700));
  color: var(--white);
  padding: 14px 20px;
  text-align: center;
  font-size: 0.82rem;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.setup-banner strong { color: var(--g200); }
.setup-banner a {
  color: var(--g300);
  text-decoration: underline;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- Setup banner – hidden once Firebase is configured -->
<div class="setup-banner" id="setupBanner">
  ⚠️ <strong>Trin 2 mangler:</strong> Firebase er ikke sat op endnu. Data gemmes kun lokalt i din browser indtil videre.
</div>

<!-- ── HEADER ── -->
<header class="header">
  <!-- leaf decorations -->
  <svg class="leaf-deco" style="bottom:-20px;left:60px;width:120px;" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 110 Q30 80 20 50 Q15 30 35 20 Q55 30 60 55 Q62 80 50 110Z" fill="#52b788"/>
    <path d="M50 110 Q68 75 72 48 Q78 28 58 18 Q40 28 38 55 Q38 80 50 110Z" fill="#95d5b2"/>
    <line x1="50" y1="110" x2="50" y2="20" stroke="#2d6a4f" stroke-width="1.5" opacity="0.4"/>
  </svg>
  <svg class="leaf-deco" style="top:-10px;right:180px;width:80px;transform:rotate(45deg);" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 110 Q30 80 20 50 Q15 30 35 20 Q55 30 60 55 Q62 80 50 110Z" fill="#74c69d"/>
  </svg>

  <div class="header-inner">
    <button class="nav-btn" id="prevWeek">← Forrige uge</button>

    <div>
      <div class="site-title">Madplan for <em>familien Graff</em></div>
      <div class="week-meta" style="margin-top:6px;">
        <div class="week-num" id="weekNum">Uge –</div>
        <div class="week-range" id="weekRange">– til –</div>
      </div>
    </div>

    <button class="nav-btn" id="nextWeek">Næste uge →</button>
  </div>
</header>

<!-- ── MAIN ── -->
<main class="main">

  <!-- days -->
  <div class="days-grid" id="daysGrid"></div>

  <!-- hint bar -->
  <div class="hint-bar" style="margin-top:20px;margin-bottom:0;">
    <div class="hint-item"><div class="hint-icon">⠿</div> Træk & slip for at bytte dage</div>
    <div class="hint-item"><div class="hint-icon">✓</div> Tekst gemmes automatisk</div>
    <div class="hint-item"><div class="hint-icon">📷</div> Klik på billedet for at skifte</div>
    <div class="hint-item"><div class="hint-icon">📱</div> På mobil vises dagene lodret</div>
  </div>

</main>

<!-- toast notification -->
<div id="toast"></div>

<script type="module">

// ══════════════════════════════════════════════════
//  FIREBASE – loades dynamisk så siden altid virker
// ══════════════════════════════════════════════════
let db = null;
let FIREBASE_READY = false;

async function initFirebase() {
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const { getFirestore, doc, setDoc, getDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyAYpGKhXwYqw3Vh9NeWeiimPI8YNCjZiYAs",
      authDomain:        "madplan-graff.firebaseapp.com",
      projectId:         "madplan-graff",
      storageBucket:     "madplan-graff.firebasestorage.app",
      messagingSenderId: "10854566370068",
      appId:             "1:10854566370068:web:dbbaf9daa86e3af9dc9729"
    };

    const firebaseApp = initializeApp(FIREBASE_CONFIG);
    db = getFirestore(firebaseApp);
    FIREBASE_READY = true;

    // Make Firestore functions available globally
    window._firestore = { doc, setDoc, getDoc, onSnapshot };
    document.getElementById('setupBanner').style.display = 'none';

    await loadFromFirebase(currentMonday);
    startListener(currentMonday);
  } catch(e) {
    console.warn('Firebase fejl:', e);
  }
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
const DA_DAYS   = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];
const DA_MONTHS = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function getWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function fmtDate(d) {
  return `${d.getDate()}. ${DA_MONTHS[d.getMonth()]}`;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2400);
}

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let currentMonday = getMonday(new Date());

// Load data from localStorage (replaced by Firebase later)
function storageKey(monday) {
  return `madplan_${monday.toISOString().slice(0,10)}`;
}

function loadWeekData(monday) {
  const raw = localStorage.getItem(storageKey(monday));
  if (raw) return JSON.parse(raw);
  return DA_DAYS.map(name => ({ name, meal: '', image: '' }));
}

function saveWeekData(monday, data) {
  localStorage.setItem(storageKey(monday), JSON.stringify(data));
  if (FIREBASE_READY) syncToFirebase();
}

let weekData = loadWeekData(currentMonday);

// ══════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════
function buildWeekDates(monday) {
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function isToday(d) {
  const t = new Date();
  return d.getDate() === t.getDate() &&
         d.getMonth() === t.getMonth() &&
         d.getFullYear() === t.getFullYear();
}

function renderHeader() {
  const sunday = new Date(currentMonday);
  sunday.setDate(currentMonday.getDate() + 6);
  document.getElementById('weekNum').textContent   = `Uge ${getWeekNumber(currentMonday)}`;
  document.getElementById('weekRange').textContent = `${fmtDate(currentMonday)} – ${fmtDate(sunday)} ${sunday.getFullYear()}`;
}

function renderGrid() {
  const grid  = document.getElementById('daysGrid');
  const dates = buildWeekDates(currentMonday);
  grid.innerHTML = '';

  weekData.forEach((day, idx) => {
    const date   = dates[idx];
    const today  = isToday(date);
    const card   = document.createElement('div');
    card.className = 'day-card' + (today ? ' today' : '');
    card.dataset.idx = idx;
    card.draggable = true;

    // drag handle
    card.innerHTML += `<div class="drag-handle"><span></span><span></span><span></span></div>`;
    if (today) card.innerHTML += `<div class="today-badge">I dag</div>`;

    // header
    card.innerHTML += `
      <div class="card-head">
        <div class="card-dayname">${day.name}</div>
        <div class="card-date">${fmtDate(date)}</div>
      </div>`;

    // image area
    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img-wrap';

    if (day.image) {
      imgWrap.innerHTML = `
        <img src="${day.image}" alt="${day.meal}">
        <button class="change-photo-btn" data-idx="${idx}">📷 Skift billede</button>
        <input type="file" class="file-input" accept="image/*" data-idx="${idx}">`;
    } else {
      imgWrap.innerHTML = `
        <div class="upload-overlay" data-idx="${idx}">
          <div class="u-icon">🍽️</div>
          <div class="u-text">Klik for at uploade billede</div>
        </div>
        <input type="file" class="file-input" accept="image/*" data-idx="${idx}">`;
    }
    card.appendChild(imgWrap);

    // body
    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = `
      <textarea class="meal-input" data-idx="${idx}" placeholder="Hvad spiser vi?" rows="2">${day.meal}</textarea>
      <div class="save-tick" id="tick-${idx}">Gemt</div>`;
    card.appendChild(body);

    grid.appendChild(card);
  });

  attachEvents();
}

function render() {
  renderHeader();
  renderGrid();
}

// ══════════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════════
let dragSrcIdx = null;

function attachEvents() {
  // ── meal input (auto-save) ──
  document.querySelectorAll('.meal-input').forEach(el => {
    let timer;
    el.addEventListener('input', () => {
      const idx = +el.dataset.idx;
      weekData[idx].meal = el.value;
      clearTimeout(timer);
      timer = setTimeout(() => {
        saveWeekData(currentMonday, weekData);
        const tick = document.getElementById(`tick-${idx}`);
        tick.classList.add('show');
        setTimeout(() => tick.classList.remove('show'), 2000);
        if (FIREBASE_READY) syncToFirebase(idx);
      }, 600);
    });
  });

  // ── image upload ──
  document.querySelectorAll('.file-input').forEach(input => {
    input.addEventListener('change', e => handleImageUpload(e, +input.dataset.idx));
  });
  document.querySelectorAll('.upload-overlay, .change-photo-btn').forEach(el => {
    el.addEventListener('click', () => {
      const idx = el.dataset.idx;
      el.closest('.card-img-wrap').querySelector('.file-input').click();
    });
  });

  // ── drag & drop ──
  document.querySelectorAll('.day-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrcIdx = +card.dataset.idx;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.day-card').forEach(c => c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const targetIdx = +card.dataset.idx;
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
      // swap
      [weekData[dragSrcIdx], weekData[targetIdx]] = [weekData[targetIdx], weekData[dragSrcIdx]];
      saveWeekData(currentMonday, weekData);
      toast(`${weekData[targetIdx].name} og ${weekData[dragSrcIdx].name} byttet ✓`);
      dragSrcIdx = null;
      renderGrid();
    });
  });
}

// ── image upload handler ──
async function handleImageUpload(e, idx) {
  const file = e.target.files[0];
  if (!file) return;

  // show spinner
  const wrap = document.querySelectorAll('.card-img-wrap')[idx];
  const spinner = document.createElement('div');
  spinner.className = 'spinner';
  wrap.appendChild(spinner);

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', 'madplan_unsigned');
  formData.append('cloud_name', 'di5x780hh');

  try {
    const res = await fetch('https://api.cloudinary.com/v1_1/di5x780hh/image/upload', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    if (data.secure_url) {
      weekData[idx].image = data.secure_url;
      saveWeekData(currentMonday, weekData);
      spinner.remove();
      renderGrid();
      toast('Billede gemt ✓');
    } else {
      spinner.remove();
      toast('Fejl ved upload – prøv igen');
      console.error(data);
    }
  } catch(e) {
    spinner.remove();
    toast('Fejl ved upload – prøv igen');
    console.error(e);
  }
}

// ══════════════════════════════════════════════════
//  WEEK NAVIGATION

document.getElementById('prevWeek').addEventListener('click', async () => {
  currentMonday.setDate(currentMonday.getDate() - 7);
  weekData = loadWeekData(currentMonday);
  render();
  await loadFromFirebase(currentMonday);
  startListener(currentMonday);
});
document.getElementById('nextWeek').addEventListener('click', async () => {
  currentMonday.setDate(currentMonday.getDate() + 7);
  weekData = loadWeekData(currentMonday);
  render();
  await loadFromFirebase(currentMonday);
  startListener(currentMonday);
});

// ══════════════════════════════════════════════════
//  FIREBASE SYNC
// ══════════════════════════════════════════════════
function weekDocRef(monday) {
  const { doc } = window._firestore;
  return doc(db, 'uger', monday.toISOString().slice(0,10));
}

async function loadFromFirebase(monday) {
  if (!FIREBASE_READY) return;
  try {
    const { getDoc } = window._firestore;
    const snap = await getDoc(weekDocRef(monday));
    if (snap.exists()) {
      weekData = snap.data().dage;
      renderGrid();
    }
  } catch(e) { console.warn('Firebase load fejl:', e); }
}

async function syncToFirebase() {
  if (!FIREBASE_READY) return;
  try {
    const { setDoc } = window._firestore;
    await setDoc(weekDocRef(currentMonday), { dage: weekData });
  } catch(e) { console.warn('Firebase gem fejl:', e); }
}

function uploadImageToFirebase() {}

// ══════════════════════════════════════════════════
//  REALTIME LISTENER – alle familiemedlemmer ser opdateringer
// ══════════════════════════════════════════════════
let unsubscribe = null;
function startListener(monday) {
  if (!FIREBASE_READY) return;
  const { onSnapshot } = window._firestore;
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(weekDocRef(monday), snap => {
    if (snap.exists()) {
      const newData = snap.data().dage;
      const changed = JSON.stringify(newData) !== JSON.stringify(weekData);
      if (changed) {
        weekData = newData;
        renderGrid();
        toast('Siden er opdateret af et familiemedlem 🔄');
      }
    }
  });
}

// ══════════════════════════════════════════════════
render();
initFirebase();
